<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZapPro — Finanças</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.5.0/Recharts.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.21.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #1a1d27; }
  ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
  input, select, textarea { outline: none; }
  input::placeholder { color: #4b5563; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;
const { PieChart, Pie, Cell, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend } = Recharts;

const INITIAL_DATA = [
  { id: 1, date: "2026-03-16", month: "2026-03", category: "Infra", vendor: "Cloudfy", item: "Cloud Advanced", plan_or_sku: "cloud-advanced", qty: 1, unit_cost: 83.19, amount: 83.19, currency: "BRL", billing_type: "monthly", project_or_client: "Zappro", payment_method: "Mastercard", status: "paid", notes: "Plano Cloud Advanced" },
  { id: 2, date: "2026-03-19", month: "2026-03", category: "Domains", vendor: "Registro.br", item: "Domain registration", plan_or_sku: "zapproai.com.br", qty: 1, unit_cost: 40.00, amount: 40.00, currency: "BRL", billing_type: "yearly", project_or_client: "Zappro", payment_method: "Pix", status: "paid", notes: "Registro do domínio" },
  { id: 3, date: "2026-03-19", month: "2026-03", category: "AI", vendor: "Cloudfy", item: "LLM Unlimited (prorated)", plan_or_sku: "llm-unlimited-prorated", qty: 1, unit_cost: 49.75, amount: 49.75, currency: "BRL", billing_type: "one_time", project_or_client: "Zappro", payment_method: "Mastercard", status: "paid", notes: "Cobrança proporcional na ativação" },
  { id: 4, date: "2026-03-19", month: "2026-03", category: "AI", vendor: "Cloudfy", item: "LLM Unlimited", plan_or_sku: "llm-unlimited", qty: 1, unit_cost: 55.00, amount: 55.00, currency: "BRL", billing_type: "monthly", project_or_client: "Zappro", payment_method: "Mastercard", status: "paid", notes: "Assinatura mensal ativa" },
  { id: 5, date: "2026-03-01", month: "2026-03", category: "AI", vendor: "Anthropic", item: "Claude Max", plan_or_sku: "claude-max", qty: 1, unit_cost: 120.00, amount: 120.00, currency: "BRL", billing_type: "monthly", project_or_client: "Zappro", payment_method: "Mastercard", status: "paid", notes: "Plano Claude Max pessoal" },
];

const CATEGORIES = ["AI", "Infra", "Domains", "Tools", "Marketing", "Outros"];
const BILLING_TYPES = ["monthly", "yearly", "one_time", "per_use"];
const STATUSES = ["paid", "pending", "scheduled"];
const METHODS = ["Mastercard", "Visa", "Pix", "Boleto", "Outro"];

const CATEGORY_COLORS = {
  "AI": "#22c55e",
  "Infra": "#3b82f6",
  "Domains": "#a855f7",
  "Tools": "#f59e0b",
  "Marketing": "#ef4444",
  "Outros": "#6b7280"
};

const fmt = (n) => `R$${Number(n).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.')}`;
const fmtShort = (n) => `R$${Number(n).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, '.')}`;

function loadData() {
  try {
    const stored = localStorage.getItem('zappro_finance_v1');
    if (stored) return JSON.parse(stored);
  } catch(e) {}
  return INITIAL_DATA;
}

function saveData(data) {
  try { localStorage.setItem('zappro_finance_v1', JSON.stringify(data)); } catch(e) {}
}

const EMPTY_FORM = {
  date: new Date().toISOString().split('T')[0],
  month: new Date().toISOString().slice(0,7),
  category: "AI",
  vendor: "",
  item: "",
  plan_or_sku: "",
  qty: 1,
  unit_cost: "",
  amount: "",
  currency: "BRL",
  billing_type: "monthly",
  project_or_client: "Zappro",
  payment_method: "Mastercard",
  status: "paid",
  notes: ""
};

function Modal({ title, onClose, children }) {
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:'16px'}} onClick={onClose}>
      <div style={{background:'#1a1d27',border:'1px solid #2d3748',borderRadius:'12px',width:'100%',maxWidth:'560px',maxHeight:'90vh',overflow:'auto'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'20px 24px',borderBottom:'1px solid #2d3748'}}>
          <span style={{fontWeight:600,fontSize:'16px'}}>{title}</span>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#6b7280',cursor:'pointer',fontSize:'20px',lineHeight:1}}>×</button>
        </div>
        <div style={{padding:'24px'}}>{children}</div>
      </div>
    </div>
  );
}

function FormField({ label, children }) {
  return (
    <div style={{marginBottom:'14px'}}>
      <label style={{display:'block',fontSize:'12px',color:'#9ca3af',marginBottom:'6px',fontWeight:500}}>{label}</label>
      {children}
    </div>
  );
}

const inputStyle = {
  width:'100%', background:'#0f1117', border:'1px solid #2d3748', borderRadius:'8px',
  padding:'8px 12px', color:'#e2e8f0', fontSize:'14px'
};
const selectStyle = { ...inputStyle, cursor:'pointer' };

function ExpenseForm({ initial, onSave, onClose }) {
  const [form, setForm] = useState(initial || EMPTY_FORM);
  const set = (k, v) => setForm(f => {
    const next = {...f, [k]: v};
    if (k === 'unit_cost' || k === 'qty') next.amount = (parseFloat(next.unit_cost)||0) * (parseFloat(next.qty)||1);
    if (k === 'date') next.month = v.slice(0,7);
    return next;
  });

  return (
    <form onSubmit={e=>{e.preventDefault();onSave(form);}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 16px'}}>
        <FormField label="Data">
          <input type="date" style={inputStyle} value={form.date} onChange={e=>set('date',e.target.value)} required />
        </FormField>
        <FormField label="Categoria">
          <select style={selectStyle} value={form.category} onChange={e=>set('category',e.target.value)}>
            {CATEGORIES.map(c=><option key={c}>{c}</option>)}
          </select>
        </FormField>
        <FormField label="Fornecedor">
          <input style={inputStyle} value={form.vendor} onChange={e=>set('vendor',e.target.value)} placeholder="Ex: Cloudfy" required />
        </FormField>
        <FormField label="Item">
          <input style={inputStyle} value={form.item} onChange={e=>set('item',e.target.value)} placeholder="Ex: Cloud Advanced" required />
        </FormField>
        <FormField label="SKU / Plano">
          <input style={inputStyle} value={form.plan_or_sku} onChange={e=>set('plan_or_sku',e.target.value)} placeholder="cloud-advanced" />
        </FormField>
        <FormField label="Tipo de Cobrança">
          <select style={selectStyle} value={form.billing_type} onChange={e=>set('billing_type',e.target.value)}>
            {BILLING_TYPES.map(b=><option key={b}>{b}</option>)}
          </select>
        </FormField>
        <FormField label="Qtd">
          <input type="number" style={inputStyle} value={form.qty} min="1" onChange={e=>set('qty',e.target.value)} />
        </FormField>
        <FormField label="Custo Unitário (BRL)">
          <input type="number" step="0.01" style={inputStyle} value={form.unit_cost} onChange={e=>set('unit_cost',e.target.value)} placeholder="0,00" required />
        </FormField>
        <FormField label="Total (BRL)">
          <input type="number" step="0.01" style={inputStyle} value={form.amount} onChange={e=>set('amount',e.target.value)} placeholder="0,00" required />
        </FormField>
        <FormField label="Pagamento">
          <select style={selectStyle} value={form.payment_method} onChange={e=>set('payment_method',e.target.value)}>
            {METHODS.map(m=><option key={m}>{m}</option>)}
          </select>
        </FormField>
        <FormField label="Status">
          <select style={selectStyle} value={form.status} onChange={e=>set('status',e.target.value)}>
            {STATUSES.map(s=><option key={s}>{s}</option>)}
          </select>
        </FormField>
        <FormField label="Cliente / Projeto">
          <input style={inputStyle} value={form.project_or_client} onChange={e=>set('project_or_client',e.target.value)} />
        </FormField>
      </div>
      <FormField label="Notas">
        <textarea style={{...inputStyle,resize:'vertical',minHeight:'60px'}} value={form.notes} onChange={e=>set('notes',e.target.value)} />
      </FormField>
      <div style={{display:'flex',gap:'10px',justifyContent:'flex-end',marginTop:'8px'}}>
        <button type="button" onClick={onClose} style={{padding:'8px 20px',borderRadius:'8px',border:'1px solid #2d3748',background:'none',color:'#9ca3af',cursor:'pointer',fontSize:'14px'}}>Cancelar</button>
        <button type="submit" style={{padding:'8px 24px',borderRadius:'8px',border:'none',background:'linear-gradient(135deg,#22c55e,#38bdf8)',color:'#000',fontWeight:600,cursor:'pointer',fontSize:'14px'}}>Salvar</button>
      </div>
    </form>
  );
}

function StatusBadge({ status }) {
  const colors = { paid: ['#16a34a','#dcfce7'], pending: ['#d97706','#fef3c7'], scheduled: ['#2563eb','#dbeafe'] };
  const [text, bg] = colors[status] || ['#6b7280','#f3f4f6'];
  return <span style={{background:bg,color:text,padding:'2px 8px',borderRadius:'20px',fontSize:'11px',fontWeight:600}}>{status}</span>;
}

function Card({ label, value, sub, color='#22c55e', icon }) {
  return (
    <div style={{background:'#1a1d27',border:'1px solid #2d3748',borderRadius:'12px',padding:'20px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px'}}>
        <span style={{fontSize:'12px',color:'#6b7280',fontWeight:500,textTransform:'uppercase',letterSpacing:'0.05em'}}>{label}</span>
        {icon && <span style={{fontSize:'18px'}}>{icon}</span>}
      </div>
      <div style={{fontSize:'26px',fontWeight:700,color}}>{value}</div>
      {sub && <div style={{fontSize:'12px',color:'#6b7280',marginTop:'4px'}}>{sub}</div>}
    </div>
  );
}

function App() {
  const [data, setData] = useState(loadData);
  const [filterMonth, setFilterMonth] = useState('');
  const [filterCat, setFilterCat] = useState('');
  const [filterStatus, setFilterStatus] = useState('');
  const [search, setSearch] = useState('');
  const [modal, setModal] = useState(null); // null | 'add' | {edit: item}
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [activeTab, setActiveTab] = useState('dashboard'); // dashboard | table

  useEffect(() => saveData(data), [data]);

  const months = useMemo(() => [...new Set(data.map(d=>d.month))].sort().reverse(), [data]);
  const selectedMonth = filterMonth || (months[0] || '');

  const monthData = useMemo(() => data.filter(d => d.month === selectedMonth), [data, selectedMonth]);

  const filtered = useMemo(() => {
    let d = data;
    if (filterMonth) d = d.filter(r=>r.month===filterMonth);
    if (filterCat) d = d.filter(r=>r.category===filterCat);
    if (filterStatus) d = d.filter(r=>r.status===filterStatus);
    if (search) {
      const s = search.toLowerCase();
      d = d.filter(r=>[r.vendor,r.item,r.notes,r.plan_or_sku].some(f=>(f||'').toLowerCase().includes(s)));
    }
    return d.sort((a,b)=>b.date.localeCompare(a.date));
  }, [data, filterMonth, filterCat, filterStatus, search]);

  // Stats for selected month
  const totalMonth = monthData.reduce((s,d)=>s+Number(d.amount),0);
  const recurring = monthData.filter(d=>d.billing_type==='monthly').reduce((s,d)=>s+Number(d.amount),0);
  const oneTime = monthData.filter(d=>d.billing_type!=='monthly').reduce((s,d)=>s+Number(d.amount),0);

  const byCat = useMemo(() => {
    const map = {};
    monthData.forEach(d=>{ map[d.category]=(map[d.category]||0)+Number(d.amount); });
    return Object.entries(map).map(([name,value])=>({name,value:Number(value.toFixed(2))}));
  }, [monthData]);

  const byMonth = useMemo(() => {
    const map = {};
    data.forEach(d=>{ map[d.month]=(map[d.month]||0)+Number(d.amount); });
    return Object.entries(map).sort(([a],[b])=>a.localeCompare(b)).map(([month,total])=>({month:month.slice(5),total:Number(total.toFixed(2))}));
  }, [data]);

  const nextId = () => Math.max(0,...data.map(d=>d.id))+1;

  const handleSave = (form, id=null) => {
    if (id) {
      setData(d=>d.map(r=>r.id===id ? {...form, id} : r));
    } else {
      setData(d=>[...d, {...form, id:nextId(), amount: Number(form.amount), unit_cost: Number(form.unit_cost)}]);
    }
    setModal(null);
  };

  const handleDelete = (id) => {
    setData(d=>d.filter(r=>r.id!==id));
    setDeleteConfirm(null);
  };

  const exportCSV = () => {
    const cols = ['date','month','category','vendor','item','plan_or_sku','qty','unit_cost','amount','currency','billing_type','project_or_client','payment_method','status','notes'];
    const rows = [cols.join(','), ...data.map(r=>cols.map(c=>`"${String(r[c]||'').replace(/"/g,'""')}"`).join(','))];
    const blob = new Blob([rows.join('\n')], {type:'text/csv'});
    const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='zappro_costs.csv'; a.click();
  };

  const importCSV = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const lines = ev.target.result.split('\n').filter(Boolean);
      const headers = lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
      const rows = lines.slice(1).map((line,i) => {
        const vals = line.match(/(".*?"|[^,]+)(?=,|$)/g) || [];
        const obj = {id: nextId()+i};
        headers.forEach((h,j)=>{ obj[h] = (vals[j]||'').replace(/^"|"$/g,'').replace(/""/g,'"'); });
        obj.amount = parseFloat(obj.amount)||0;
        obj.unit_cost = parseFloat(obj.unit_cost)||0;
        obj.qty = parseInt(obj.qty)||1;
        return obj;
      });
      setData(rows);
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const CustomTooltip = ({active,payload,label}) => {
    if (!active||!payload?.length) return null;
    return <div style={{background:'#1a1d27',border:'1px solid #2d3748',borderRadius:'8px',padding:'10px 14px',fontSize:'13px'}}>
      <p style={{color:'#9ca3af',marginBottom:'4px'}}>{label}</p>
      {payload.map((p,i)=><p key={i} style={{color:p.color||'#22c55e',fontWeight:600}}>{fmt(p.value)}</p>)}
    </div>;
  };

  return (
    <div style={{maxWidth:'1100px',margin:'0 auto',padding:'24px 16px'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'28px',flexWrap:'wrap',gap:'12px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
          <div style={{width:'36px',height:'36px',background:'linear-gradient(135deg,#22c55e,#38bdf8)',borderRadius:'10px',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:'18px',color:'#000'}}>Z</div>
          <div>
            <div style={{fontWeight:700,fontSize:'18px'}}>ZapPro</div>
            <div style={{fontSize:'12px',color:'#6b7280'}}>Controle Financeiro</div>
          </div>
        </div>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
          <label style={{padding:'7px 14px',borderRadius:'8px',border:'1px solid #2d3748',color:'#9ca3af',cursor:'pointer',fontSize:'13px',display:'flex',alignItems:'center',gap:'6px'}}>
            📥 Importar CSV
            <input type="file" accept=".csv" style={{display:'none'}} onChange={importCSV} />
          </label>
          <button onClick={exportCSV} style={{padding:'7px 14px',borderRadius:'8px',border:'1px solid #2d3748',background:'none',color:'#9ca3af',cursor:'pointer',fontSize:'13px'}}>📤 Exportar CSV</button>
          <button onClick={()=>setModal('add')} style={{padding:'7px 16px',borderRadius:'8px',border:'none',background:'linear-gradient(135deg,#22c55e,#38bdf8)',color:'#000',fontWeight:600,cursor:'pointer',fontSize:'13px'}}>+ Novo Gasto</button>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',gap:'4px',marginBottom:'24px',background:'#1a1d27',padding:'4px',borderRadius:'10px',width:'fit-content',border:'1px solid #2d3748'}}>
        {['dashboard','table'].map(t=>(
          <button key={t} onClick={()=>setActiveTab(t)} style={{padding:'7px 20px',borderRadius:'7px',border:'none',background:activeTab===t?'#2d3748':'none',color:activeTab===t?'#e2e8f0':'#6b7280',cursor:'pointer',fontSize:'13px',fontWeight:activeTab===t?600:400,transition:'all 0.15s'}}>
            {t==='dashboard'?'📊 Dashboard':'📋 Lançamentos'}
          </button>
        ))}
      </div>

      {/* Month selector */}
      <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'24px',flexWrap:'wrap'}}>
        <span style={{fontSize:'13px',color:'#6b7280'}}>Mês:</span>
        <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
          {months.map(m=>(
            <button key={m} onClick={()=>setFilterMonth(m===filterMonth?'':m)} style={{padding:'5px 14px',borderRadius:'20px',border:`1px solid ${filterMonth===m||(!filterMonth&&m===months[0])?'#22c55e':'#2d3748'}`,background:(filterMonth===m||(!filterMonth&&m===months[0]))?'rgba(34,197,94,0.1)':'none',color:(filterMonth===m||(!filterMonth&&m===months[0]))?'#22c55e':'#6b7280',cursor:'pointer',fontSize:'13px',fontWeight:600}}>
              {m}
            </button>
          ))}
        </div>
      </div>

      {activeTab === 'dashboard' && (
        <>
          {/* Cards */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:'14px',marginBottom:'24px'}}>
            <Card label="Total do Mês" value={fmt(totalMonth)} sub={`${monthData.length} lançamentos`} color="#e2e8f0" icon="💰" />
            <Card label="Recorrente" value={fmt(recurring)} sub="cobranças mensais" color="#22c55e" icon="🔄" />
            <Card label="Pontual" value={fmt(oneTime)} sub="one-time / anual" color="#f59e0b" icon="⚡" />
            <Card label="Projeção Mensal" value={fmt(recurring)} sub="base recorrente" color="#38bdf8" icon="📈" />
          </div>

          {/* Charts */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'14px',marginBottom:'24px'}}>
            <div style={{background:'#1a1d27',border:'1px solid #2d3748',borderRadius:'12px',padding:'20px'}}>
              <div style={{fontSize:'13px',color:'#9ca3af',fontWeight:600,marginBottom:'16px',textTransform:'uppercase',letterSpacing:'0.05em'}}>Por Categoria — {selectedMonth}</div>
              {byCat.length > 0 ? (
                <ResponsiveContainer width="100%" height={200}>
                  <PieChart>
                    <Pie data={byCat} cx="50%" cy="50%" innerRadius={55} outerRadius={85} paddingAngle={3} dataKey="value">
                      {byCat.map((entry,i)=><Cell key={i} fill={CATEGORY_COLORS[entry.name]||'#6b7280'} />)}
                    </Pie>
                    <Tooltip content={<CustomTooltip />} />
                    <Legend formatter={(v)=><span style={{color:'#9ca3af',fontSize:'12px'}}>{v}</span>} />
                  </PieChart>
                </ResponsiveContainer>
              ) : <div style={{height:200,display:'flex',alignItems:'center',justifyContent:'center',color:'#4b5563'}}>Sem dados</div>}
            </div>

            <div style={{background:'#1a1d27',border:'1px solid #2d3748',borderRadius:'12px',padding:'20px'}}>
              <div style={{fontSize:'13px',color:'#9ca3af',fontWeight:600,marginBottom:'16px',textTransform:'uppercase',letterSpacing:'0.05em'}}>Evolução Mensal</div>
              <ResponsiveContainer width="100%" height={200}>
                <BarChart data={byMonth} margin={{left:-10}}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#1f2937" />
                  <XAxis dataKey="month" tick={{fill:'#6b7280',fontSize:11}} />
                  <YAxis tick={{fill:'#6b7280',fontSize:11}} tickFormatter={v=>`R$${v}`} />
                  <Tooltip content={<CustomTooltip />} />
                  <Bar dataKey="total" fill="#22c55e" radius={[4,4,0,0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>

          {/* Category breakdown */}
          <div style={{background:'#1a1d27',border:'1px solid #2d3748',borderRadius:'12px',padding:'20px',marginBottom:'24px'}}>
            <div style={{fontSize:'13px',color:'#9ca3af',fontWeight:600,marginBottom:'16px',textTransform:'uppercase',letterSpacing:'0.05em'}}>Breakdown — {selectedMonth}</div>
            <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
              {byCat.sort((a,b)=>b.value-a.value).map(({name,value})=>{
                const pct = totalMonth>0 ? (value/totalMonth*100).toFixed(1) : 0;
                return (
                  <div key={name}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:'4px'}}>
                      <span style={{fontSize:'13px',color:'#e2e8f0',display:'flex',alignItems:'center',gap:'8px'}}>
                        <span style={{width:'8px',height:'8px',borderRadius:'50%',background:CATEGORY_COLORS[name]||'#6b7280',display:'inline-block'}} />
                        {name}
                      </span>
                      <span style={{fontSize:'13px',fontWeight:600,color:'#e2e8f0'}}>{fmt(value)} <span style={{color:'#6b7280',fontWeight:400}}>({pct}%)</span></span>
                    </div>
                    <div style={{height:'4px',background:'#1f2937',borderRadius:'2px'}}>
                      <div style={{height:'100%',width:`${pct}%`,background:CATEGORY_COLORS[name]||'#6b7280',borderRadius:'2px',transition:'width 0.5s'}} />
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </>
      )}

      {activeTab === 'table' && (
        <>
          {/* Filters */}
          <div style={{display:'flex',gap:'8px',marginBottom:'16px',flexWrap:'wrap'}}>
            <input style={{...inputStyle,width:'200px'}} placeholder="🔍 Buscar..." value={search} onChange={e=>setSearch(e.target.value)} />
            <select style={{...selectStyle,width:'140px'}} value={filterCat} onChange={e=>setFilterCat(e.target.value)}>
              <option value="">Todas categorias</option>
              {CATEGORIES.map(c=><option key={c}>{c}</option>)}
            </select>
            <select style={{...selectStyle,width:'130px'}} value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
              <option value="">Todos status</option>
              {STATUSES.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>

          {/* Table */}
          <div style={{background:'#1a1d27',border:'1px solid #2d3748',borderRadius:'12px',overflow:'hidden'}}>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
                <thead>
                  <tr style={{borderBottom:'1px solid #2d3748'}}>
                    {['Data','Categoria','Fornecedor','Item','Valor','Tipo','Status',''].map(h=>(
                      <th key={h} style={{padding:'12px 16px',textAlign:'left',color:'#6b7280',fontWeight:600,fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.05em',whiteSpace:'nowrap'}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.length === 0 && (
                    <tr><td colSpan={8} style={{padding:'32px',textAlign:'center',color:'#4b5563'}}>Nenhum lançamento encontrado</td></tr>
                  )}
                  {filtered.map(row=>(
                    <tr key={row.id} style={{borderBottom:'1px solid #1f2937',transition:'background 0.1s'}} onMouseEnter={e=>e.currentTarget.style.background='#1f2937'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                      <td style={{padding:'12px 16px',whiteSpace:'nowrap',color:'#9ca3af'}}>{row.date}</td>
                      <td style={{padding:'12px 16px'}}>
                        <span style={{display:'flex',alignItems:'center',gap:'6px'}}>
                          <span style={{width:'8px',height:'8px',borderRadius:'50%',background:CATEGORY_COLORS[row.category]||'#6b7280',flexShrink:0}} />
                          {row.category}
                        </span>
                      </td>
                      <td style={{padding:'12px 16px',fontWeight:500}}>{row.vendor}</td>
                      <td style={{padding:'12px 16px',color:'#9ca3af',maxWidth:'180px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={row.item}>{row.item}</td>
                      <td style={{padding:'12px 16px',fontWeight:700,whiteSpace:'nowrap'}}>{fmt(row.amount)}</td>
                      <td style={{padding:'12px 16px',color:'#6b7280',whiteSpace:'nowrap'}}>{row.billing_type}</td>
                      <td style={{padding:'12px 16px'}}><StatusBadge status={row.status} /></td>
                      <td style={{padding:'12px 16px'}}>
                        <div style={{display:'flex',gap:'6px'}}>
                          <button onClick={()=>setModal({edit:row})} style={{background:'none',border:'1px solid #2d3748',borderRadius:'6px',color:'#9ca3af',cursor:'pointer',padding:'4px 10px',fontSize:'12px'}}>✏️</button>
                          <button onClick={()=>setDeleteConfirm(row)} style={{background:'none',border:'1px solid #2d3748',borderRadius:'6px',color:'#9ca3af',cursor:'pointer',padding:'4px 10px',fontSize:'12px'}}>🗑️</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
                <tfoot>
                  <tr style={{borderTop:'2px solid #2d3748',background:'#1f2937'}}>
                    <td colSpan={4} style={{padding:'12px 16px',color:'#6b7280',fontSize:'12px'}}>{filtered.length} itens</td>
                    <td style={{padding:'12px 16px',fontWeight:700,color:'#22c55e'}}>{fmt(filtered.reduce((s,r)=>s+Number(r.amount),0))}</td>
                    <td colSpan={3} />
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        </>
      )}

      {/* Add modal */}
      {modal === 'add' && (
        <Modal title="Novo Gasto" onClose={()=>setModal(null)}>
          <ExpenseForm onSave={form=>handleSave(form)} onClose={()=>setModal(null)} />
        </Modal>
      )}

      {/* Edit modal */}
      {modal?.edit && (
        <Modal title="Editar Gasto" onClose={()=>setModal(null)}>
          <ExpenseForm initial={modal.edit} onSave={form=>handleSave(form,modal.edit.id)} onClose={()=>setModal(null)} />
        </Modal>
      )}

      {/* Delete confirm */}
      {deleteConfirm && (
        <Modal title="Confirmar Exclusão" onClose={()=>setDeleteConfirm(null)}>
          <p style={{color:'#9ca3af',marginBottom:'20px',lineHeight:1.6}}>
            Deletar <strong style={{color:'#e2e8f0'}}>{deleteConfirm.item}</strong> ({fmt(deleteConfirm.amount)})?<br/>
            <span style={{fontSize:'12px',color:'#ef4444'}}>Essa ação não pode ser desfeita.</span>
          </p>
          <div style={{display:'flex',gap:'10px',justifyContent:'flex-end'}}>
            <button onClick={()=>setDeleteConfirm(null)} style={{padding:'8px 20px',borderRadius:'8px',border:'1px solid #2d3748',background:'none',color:'#9ca3af',cursor:'pointer',fontSize:'14px'}}>Cancelar</button>
            <button onClick={()=>handleDelete(deleteConfirm.id)} style={{padding:'8px 20px',borderRadius:'8px',border:'none',background:'#ef4444',color:'#fff',fontWeight:600,cursor:'pointer',fontSize:'14px'}}>Deletar</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
